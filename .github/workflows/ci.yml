name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, tests, contract drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest — hermetic settings, no services needed)
        run: python -m pytest -q

      - name: Contract drift (served OpenAPI vs locked endpoints.ts)
        run: python scripts/check_contract_drift.py

      - name: Migration hygiene (no model changes without migrations)
        run: DJANGO_SETTINGS_MODULE=echo_api.settings.test python manage.py makemigrations --check --dry-run

  frontend:
    name: Frontend — strict typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, strict)
        run: npx tsc --noEmit
