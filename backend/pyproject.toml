[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "echo_api.settings.test"
python_files = ["test_*.py"]
testpaths = ["core"]

[tool.ruff]
line-length = 110
target-version = "py313"
extend-exclude = [".venv", "core/migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "DJ"]
ignore = [
    "E402", # settings modules intentionally import after dotenv load
]
