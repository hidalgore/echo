# Local dev services for the ECHO backend (W4).
# Usage: docker compose up -d   (then backend/.venv + manage.py runserver)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: echo
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
    ports:
      - "5432:5432"
    volumes:
      - echo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo -d echo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - echo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  echo_pgdata:
  echo_redisdata:
